<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spider_XHS</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 90, 90, 0.18), transparent 42%),
        linear-gradient(160deg, #111827 0%, #0f172a 45%, #1f2937 100%);
      color: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(540px, 100%);
      padding: 28px;
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 80px rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.62);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.1;
    }

    p {
      margin: 0;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.82);
    }

    .pulse {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 22px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.74);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #fb7185;
      box-shadow: 0 0 0 0 rgba(251, 113, 133, 0.45);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(251, 113, 133, 0.45);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 16px rgba(251, 113, 133, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(251, 113, 133, 0);
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Spider_XHS Desktop</p>
    <h1>正在启动本地服务</h1>
    <p>桌面程序正在拉起采集服务并连接控制台。首次启动可能会稍慢一点，完成后会自动进入主界面。</p>
    <div class="pulse">
      <span class="dot"></span>
      <span>初始化中...</span>
    </div>
  </main>
</body>
</html>
