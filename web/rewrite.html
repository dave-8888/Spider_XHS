<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spider_XHS AI仿写</title>
  <script>
    (() => {
      const key = 'spider_xhs_theme';
      const sidebarKey = 'spider_xhs_sidebar';
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      let mode = 'system';
      try {
        const stored = localStorage.getItem(key);
        mode = ['light', 'dark', 'system'].includes(stored) ? stored : 'system';
      } catch (_error) {
        mode = 'system';
      }
      document.documentElement.dataset.themeMode = mode;
      document.documentElement.dataset.theme = mode === 'system'
        ? (prefersDark ? 'dark' : 'light')
        : mode;
      try {
        const storedSidebar = localStorage.getItem(sidebarKey);
        document.documentElement.dataset.sidebar = storedSidebar === 'collapsed' ? 'collapsed' : 'expanded';
      } catch (_error) {
        document.documentElement.dataset.sidebar = 'expanded';
      }
    })();
  </script>
  <link rel="stylesheet" href="/ui/app.css">
</head>
<body data-page="rewrite">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/" aria-label="Spider_XHS 采集台">
        <span class="brand-mark">SX</span>
        <span class="brand-copy">
          <span class="brand-name">Spider_XHS</span>
          <span class="brand-subtitle">Business Console</span>
        </span>
      </a>
      <button class="sidebar-toggle" data-sidebar-toggle type="button" aria-label="收起左侧菜单" aria-expanded="true" title="收起左侧菜单">
        <svg class="sidebar-toggle-icon sidebar-toggle-icon-collapse" viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/><path d="M20 5v14"/></svg>
        <svg class="sidebar-toggle-icon sidebar-toggle-icon-expand" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/><path d="M4 5v14"/></svg>
        <span class="sidebar-toggle-label">收起菜单</span>
      </button>
      <div class="topbar-actions">
        <nav class="topnav" aria-label="主导航">
          <a class="nav-link" href="/" title="任务监控">
            <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 13h4l2-6 4 10 2-4h4"/><path d="M4 19h16"/></svg></span>
            <span class="nav-label">任务监控</span>
          </a>
          <a class="nav-link active" href="/rewrite" aria-current="page" title="文案创作">
            <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m4.5 19.5 9.8-9.8 2 2-9.8 9.8h-2z"/><path d="m13.7 6.3 2-2 4 4-2 2"/><path d="M6 5h5"/></svg></span>
            <span class="nav-label">文案创作</span>
          </a>
          <a class="nav-link" href="/settings" title="设置">
            <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z"/><path d="M19 12a7.1 7.1 0 0 0-.1-1l2-1.5-2-3.5-2.4 1a7.6 7.6 0 0 0-1.7-1L14.5 3h-5l-.3 3a7.6 7.6 0 0 0-1.7 1L5.1 6l-2 3.5 2 1.5a7.1 7.1 0 0 0 0 2l-2 1.5 2 3.5 2.4-1a7.6 7.6 0 0 0 1.7 1l.3 3h5l.3-3a7.6 7.6 0 0 0 1.7-1l2.4 1 2-3.5-2-1.5a7.1 7.1 0 0 0 .1-1z"/></svg></span>
            <span class="nav-label">设置</span>
          </a>
        </nav>
        <div class="theme-switch" role="group" aria-label="主题模式">
          <button class="theme-option" data-theme-option="light" data-short-label="浅" type="button">浅色</button>
          <button class="theme-option" data-theme-option="dark" data-short-label="深" type="button">深色</button>
          <button class="theme-option" data-theme-option="system" data-short-label="系" type="button">系统</button>
        </div>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <section id="fileSection" class="surface reveal file-section md-quick-disabled">
      <div class="section-title file-section-title">
        <span class="section-index">01</span>
        <div class="file-section-heading">
          <h2>资产归档与 AI 仿写</h2>
          <p class="muted">采集结果、素材、Markdown 预览与文案生成。</p>
        </div>
        <div id="fileListMeta" class="file-list-meta" aria-live="polite"></div>
      </div>

      <div class="md-quick-shell" hidden aria-hidden="true">
        <div class="md-quick-shell-head">
          <div class="md-quick-title">
            <strong>Markdown 快捷入口</strong>
            <span>最新爬取与最近仿写</span>
          </div>
          <button id="refreshRecentMdBtn" class="btn btn-ghost file-preview-action" type="button" title="刷新 Markdown 列表" aria-label="刷新 Markdown 列表">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 8a7 7 0 0 0-12.2-2.4L5 7.5"/><path d="M5 4v3.5h3.5"/><path d="M5 16a7 7 0 0 0 12.2 2.4L19 16.5"/><path d="M19 20v-3.5h-3.5"/></svg>
          </button>
        </div>
        <div class="md-quick-grid">
          <section class="md-quick-panel" aria-labelledby="recentCrawledMdTitle">
            <div class="md-quick-panel-head">
              <strong id="recentCrawledMdTitle">最新爬取 MD</strong>
              <span id="recentCrawledMdMeta">0 个</span>
            </div>
            <div id="recentCrawledMdList" class="md-quick-list"></div>
          </section>
          <section class="md-quick-panel" aria-labelledby="recentRewriteMdTitle">
            <div class="md-quick-panel-head">
              <strong id="recentRewriteMdTitle">最近仿写 MD</strong>
              <span id="recentRewriteMdMeta">0 个</span>
            </div>
            <div id="recentRewriteMdList" class="md-quick-list"></div>
          </section>
        </div>
      </div>

      <div class="file-browser-head">
        <div id="fileBreadcrumbs" class="file-breadcrumbs" aria-label="当前目录"></div>
      </div>

      <div class="file-toolbar" role="toolbar" aria-label="本地文件操作">
        <div class="file-toolbar-left">
          <div id="fileSelectionWrap" class="file-toolbar-copy file-multi-select-control" aria-live="polite" hidden>
            <div id="fileSelectionSummary" class="file-selection-summary">已选 0 项</div>
          </div>
          <button id="selectAllFilesBtn" class="btn btn-ghost btn-icon-text file-multi-select-control" type="button" hidden>
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5z"/><path d="m8 12 2.3 2.3L16 8.6"/></svg>
            全选
          </button>
          <button id="clearFileSelectionBtn" class="btn btn-ghost btn-icon-text file-multi-select-control" type="button" disabled hidden>
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5z"/><path d="m8 8 8 8M16 8l-8 8"/></svg>
            清空
          </button>
          <button id="rewriteSelectedBtn" class="btn btn-secondary btn-icon-text file-rewrite-command file-multi-select-control" type="button" disabled hidden>
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m4.5 19.5 9.8-9.8 2 2-9.8 9.8h-2z"/><path d="m13.7 6.3 2-2 4 4-2 2"/><path d="M6 4.5v3M4.5 6h3M18 16.5v3M16.5 18h3"/></svg>
            AI仿写
          </button>
          <button id="deleteSelectedBtn" class="btn btn-ghost btn-icon-text file-danger-command file-multi-select-control" type="button" disabled hidden>
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14"/><path d="M9 7V5.8c0-.7.6-1.3 1.3-1.3h3.4c.7 0 1.3.6 1.3 1.3V7"/><path d="M8 10v8M12 10v8M16 10v8"/><path d="M7 7l.8 13h8.4L17 7"/></svg>
            删除
          </button>
        </div>
        <div class="file-toolbar-right">
          <button id="multiSelectModeBtn" class="btn btn-ghost btn-icon-text" type="button" aria-pressed="false">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5z"/><path d="M9 12h6"/></svg>
            多选
          </button>
          <button id="refreshFilesBtn" class="btn btn-ghost btn-icon-text" type="button">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 8a7 7 0 0 0-12.2-2.4L5 7.5"/><path d="M5 4v3.5h3.5"/><path d="M5 16a7 7 0 0 0 12.2 2.4L19 16.5"/><path d="M19 20v-3.5h-3.5"/></svg>
            刷新
          </button>
        </div>
      </div>

      <div id="fileLayout" class="file-layout">
        <div id="fileList" class="file-list"></div>
        <div
          id="fileLayoutResizer"
          class="file-layout-resizer"
          role="separator"
          aria-orientation="vertical"
          aria-label="调整文件列表和预览宽度"
          aria-valuemin="16"
          aria-valuemax="55"
          aria-valuenow="20"
          tabindex="0"
        ></div>
        <div id="filePreviewPanel" class="file-preview-panel" aria-hidden="false">
          <div class="file-preview-header">
            <div class="file-preview-heading">
              <strong id="filePreviewMeta" class="file-preview-title"></strong>
              <span id="filePreviewSubMeta" class="file-preview-subtitle"></span>
            </div>
            <div class="file-preview-actions">
              <button id="copyPreviewTextBtn" class="btn btn-ghost file-preview-action" type="button" title="复制文本" aria-label="复制文本" disabled>
                <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 8h10v12H8z"/><path d="M6 16H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"/></svg>
              </button>
              <button id="closePreviewBtn" class="btn btn-ghost file-preview-action" type="button" title="关闭预览" aria-label="关闭预览" disabled>
                <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7l10 10M17 7 7 17"/></svg>
              </button>
            </div>
          </div>
          <div id="filePreview" class="file-preview is-empty" tabindex="0">
            <div class="file-preview-empty">
              <span class="file-preview-empty-icon" aria-hidden="true"></span>
              <strong>未选择文件</strong>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="/ui/app.js"></script>
</body>
</html>
