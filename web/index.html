<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spider_XHS 采集台</title>
  <script>
    (() => {
      const key = 'spider_xhs_theme';
      const sidebarKey = 'spider_xhs_sidebar';
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      let mode = 'system';
      try {
        const stored = localStorage.getItem(key);
        mode = ['light', 'dark', 'system'].includes(stored) ? stored : 'system';
      } catch (_error) {
        mode = 'system';
      }
      document.documentElement.dataset.themeMode = mode;
      document.documentElement.dataset.theme = mode === 'system'
        ? (prefersDark ? 'dark' : 'light')
        : mode;
      try {
        const storedSidebar = localStorage.getItem(sidebarKey);
        document.documentElement.dataset.sidebar = storedSidebar === 'collapsed' ? 'collapsed' : 'expanded';
      } catch (_error) {
        document.documentElement.dataset.sidebar = 'expanded';
      }
    })();
  </script>
  <link rel="stylesheet" href="/ui/app.css">
</head>
<body data-page="home">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/" aria-label="Spider_XHS 采集台">
        <span class="brand-mark">SX</span>
        <span class="brand-copy">
          <span class="brand-name">Spider_XHS</span>
          <span class="brand-subtitle">Business Console</span>
        </span>
      </a>
      <button class="sidebar-toggle" data-sidebar-toggle type="button" aria-label="收起左侧菜单" aria-expanded="true" title="收起左侧菜单">
        <svg class="sidebar-toggle-icon sidebar-toggle-icon-collapse" viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/><path d="M20 5v14"/></svg>
        <svg class="sidebar-toggle-icon sidebar-toggle-icon-expand" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/><path d="M4 5v14"/></svg>
        <span class="sidebar-toggle-label">收起菜单</span>
      </button>
      <div class="topbar-actions">
        <nav class="topnav" aria-label="主导航">
          <a class="nav-link active" href="/" aria-current="page" title="任务监控">
            <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 13h4l2-6 4 10 2-4h4"/><path d="M4 19h16"/></svg></span>
            <span class="nav-label">任务监控</span>
          </a>
          <a class="nav-link" href="/rewrite?root=crawl" data-rewrite-root-nav="crawl" title="素材库">
            <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4H10l2 2h5.5A2.5 2.5 0 0 1 20 8.5v7A2.5 2.5 0 0 1 17.5 18h-11A2.5 2.5 0 0 1 4 15.5z"/><path d="M4 9h16"/></svg></span>
            <span class="nav-label">素材库</span>
          </a>
          <a class="nav-link" href="/rewrite?root=rewrite" data-rewrite-root-nav="rewrite" title="AI创作">
            <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m4.5 19.5 9.8-9.8 2 2-9.8 9.8h-2z"/><path d="m13.7 6.3 2-2 4 4-2 2"/><path d="M6 4.5v3M4.5 6h3M18 16.5v3M16.5 18h3"/></svg></span>
            <span class="nav-label">AI创作</span>
          </a>
          <a class="nav-link" href="/settings" title="设置">
            <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z"/><path d="M19 12a7.1 7.1 0 0 0-.1-1l2-1.5-2-3.5-2.4 1a7.6 7.6 0 0 0-1.7-1L14.5 3h-5l-.3 3a7.6 7.6 0 0 0-1.7 1L5.1 6l-2 3.5 2 1.5a7.1 7.1 0 0 0 0 2l-2 1.5 2 3.5 2.4-1a7.6 7.6 0 0 0 1.7 1l.3 3h5l.3-3a7.6 7.6 0 0 0 1.7-1l2.4 1 2-3.5-2-1.5a7.1 7.1 0 0 0 .1-1z"/></svg></span>
            <span class="nav-label">设置</span>
          </a>
          <a class="nav-link" href="/advanced-settings" title="高级设置">
            <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 7h10"/><path d="M18 7h2"/><path d="M16 5v4"/><path d="M4 17h2"/><path d="M10 17h10"/><path d="M8 15v4"/></svg></span>
            <span class="nav-label">高级设置</span>
          </a>
        </nav>
        <div class="theme-switch" role="group" aria-label="主题模式">
          <button class="theme-option" data-theme-option="light" data-short-label="浅" type="button">浅色</button>
          <button class="theme-option" data-theme-option="dark" data-short-label="深" type="button">深色</button>
          <button class="theme-option" data-theme-option="system" data-short-label="系" type="button">系统</button>
        </div>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <section id="jobSection" class="surface reveal">
      <div class="section-title job-section-title">
        <span class="section-index">01</span>
        <div class="job-title-copy">
          <h2>任务监控</h2>
          <p class="muted">采集任务、进度、异常和运行日志。</p>
        </div>
        <div class="button-pair job-title-actions">
          <button id="collectBtn" class="btn btn-primary btn-icon-text" type="button">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
            启动采集任务
          </button>
          <button id="refreshJobsBtn" class="btn btn-ghost btn-icon-text job-refresh-btn" type="button">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 8a7 7 0 0 0-12.2-2.4L5 7.5"/><path d="M5 4v3.5h3.5"/><path d="M5 16a7 7 0 0 0 12.2 2.4L19 16.5"/><path d="M19 20v-3.5h-3.5"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div id="jobStatusSummary" class="job-status-summary" aria-live="polite"></div>
      <div class="job-filter-panel">
        <div id="jobFilters" class="job-filters" role="tablist" aria-label="任务状态筛选"></div>
        <div id="jobTypeFilters" class="job-filters job-type-filters" role="tablist" aria-label="任务日志类型筛选"></div>
      </div>
      <div class="job-toolbar" role="toolbar" aria-label="任务日志操作">
        <div class="job-toolbar-left">
          <div id="jobSelectionWrap" class="job-toolbar-copy job-multi-select-control" aria-live="polite" hidden>
            <div id="jobSelectionSummary" class="job-selection-summary">已选 0 条日志</div>
          </div>
          <button id="selectAllJobsBtn" class="btn btn-ghost btn-icon-text job-multi-select-control" type="button" hidden>
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5z"/><path d="m8 12 2.3 2.3L16 8.6"/></svg>
            全选
          </button>
          <button id="clearJobSelectionBtn" class="btn btn-ghost btn-icon-text job-multi-select-control" type="button" disabled hidden>
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5z"/><path d="m8 8 8 8M16 8l-8 8"/></svg>
            清空
          </button>
          <button id="deleteSelectedJobsBtn" class="btn btn-ghost btn-icon-text job-danger-command job-multi-select-control" type="button" disabled hidden>
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14"/><path d="M9 7V5.8c0-.7.6-1.3 1.3-1.3h3.4c.7 0 1.3.6 1.3 1.3V7"/><path d="M8 10v8M12 10v8M16 10v8"/><path d="M7 7l.8 13h8.4L17 7"/></svg>
            删除
          </button>
        </div>
        <div class="job-toolbar-right">
          <button id="jobMultiSelectModeBtn" class="btn btn-ghost btn-icon-text" type="button" aria-pressed="false">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5z"/><path d="M9 12h6"/></svg>
            多选
          </button>
        </div>
      </div>
      <div id="jobList" class="job-list muted">暂无任务</div>
      <div id="jobPagination" class="job-pagination is-hidden" aria-label="任务分页"></div>
    </section>
  </main>

  <div id="collectOverlay" class="collect-overlay is-hidden" aria-live="polite" aria-hidden="true">
    <div class="collect-overlay-card">
      <p class="collect-overlay-eyebrow">Collection Workflow</p>
      <h2 id="collectOverlayTitle">准备开始</h2>
      <p id="collectOverlayDetail" class="collect-overlay-detail">正在检查采集配置。</p>
      <div id="collectOverlaySteps" class="collect-overlay-steps"></div>
      <button id="collectOverlayCloseBtn" class="btn btn-secondary collect-overlay-close is-hidden" type="button">关闭</button>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="/ui/app.js"></script>
</body>
</html>
