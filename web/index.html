<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spider_XHS 采集台</title>
  <script>
    (() => {
      const key = 'spider_xhs_theme';
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      let mode = 'system';
      try {
        const stored = localStorage.getItem(key);
        mode = ['light', 'dark', 'system'].includes(stored) ? stored : 'system';
      } catch (_error) {
        mode = 'system';
      }
      document.documentElement.dataset.themeMode = mode;
      document.documentElement.dataset.theme = mode === 'system'
        ? (prefersDark ? 'dark' : 'light')
        : mode;
    })();
  </script>
  <link rel="stylesheet" href="/ui/app.css">
</head>
<body data-page="home">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">Spider_XHS</a>
      <div class="topbar-actions">
        <nav class="topnav" aria-label="主导航">
          <a class="nav-link active" href="/" aria-current="page">采集台</a>
          <a class="nav-link" href="/settings">设置</a>
        </nav>
        <div class="theme-switch" role="group" aria-label="主题模式">
          <button class="theme-option" data-theme-option="light" type="button">浅色</button>
          <button class="theme-option" data-theme-option="dark" type="button">深色</button>
          <button class="theme-option" data-theme-option="system" type="button">系统</button>
        </div>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <section class="collect-action-strip reveal">
      <button id="collectBtn" class="btn btn-primary collect-btn-centered" type="button">立即采集</button>
    </section>

    <section id="jobSection" class="surface reveal">
      <div class="section-title job-section-title">
        <span class="section-index">01</span>
        <div>
          <h2>任务状态</h2>
          <p class="muted">最近任务与日志。</p>
        </div>
        <button id="refreshJobsBtn" class="btn btn-ghost job-refresh-btn" type="button">刷新</button>
      </div>
      <div id="jobStatusSummary" class="job-status-summary" aria-live="polite"></div>
      <div id="jobFilters" class="job-filters" role="tablist" aria-label="任务状态筛选"></div>
      <div id="jobList" class="job-list muted">暂无任务</div>
    </section>

    <section class="surface reveal">
      <div class="section-title">
        <span class="section-index">02</span>
        <div>
          <h2>本地文件</h2>
          <p class="muted">最近文件与预览。</p>
        </div>
      </div>

      <div class="row spread file-toolbar">
        <div class="file-toolbar-copy">
          <div id="fileSelectionSummary" class="file-selection-summary">已选 0 项</div>
        </div>
        <div class="button-pair">
          <button id="deleteSelectedBtn" class="btn btn-ghost" type="button" disabled>批量删除</button>
          <button id="refreshFilesBtn" class="btn btn-ghost" type="button">刷新列表</button>
        </div>
      </div>

      <div id="fileLayout" class="file-layout">
        <div id="fileList" class="file-list"></div>
        <div id="filePreviewPanel" class="file-preview-panel is-hidden" aria-hidden="true">
          <div class="file-preview-header">
            <div class="file-preview-heading">
              <strong id="filePreviewMeta" class="file-preview-title"></strong>
              <span id="filePreviewSubMeta" class="file-preview-subtitle"></span>
            </div>
            <button id="copyPreviewTextBtn" class="btn btn-ghost file-preview-copy-btn" type="button">复制文本</button>
          </div>
          <div id="filePreview" class="file-preview" tabindex="0"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="collectOverlay" class="collect-overlay is-hidden" aria-live="polite" aria-hidden="true">
    <div class="collect-overlay-card">
      <p class="collect-overlay-eyebrow">Collection Flow</p>
      <h2 id="collectOverlayTitle">准备开始</h2>
      <p id="collectOverlayDetail" class="collect-overlay-detail">正在检查采集配置。</p>
      <div id="collectOverlaySteps" class="collect-overlay-steps"></div>
      <button id="collectOverlayCloseBtn" class="btn btn-secondary collect-overlay-close is-hidden" type="button">关闭</button>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="/ui/app.js"></script>
</body>
</html>
